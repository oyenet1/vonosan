name: Release Packages

on:
  push:
    branches:
      - "main"
      - "master"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  package-and-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify workspace version alignment
        run: |
          set -euo pipefail
          root_version=$(node -p "require('./package.json').version")
          mismatch=0

          for pkg in packages/*; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi

            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")

            if [ "$version" != "$root_version" ]; then
              echo "Version mismatch: $name has $version but root is $root_version"
              mismatch=1
            fi
          done

          if [ "$mismatch" -ne 0 ]; then
            echo "Version alignment check failed."
            exit 1
          fi

          echo "All workspace package versions are aligned at $root_version"

      - name: Build all packages
        run: bun run build

      - name: Resolve workspace references
        run: |
          set -euo pipefail
          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              let changed = false;
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!p[depType]) continue;
                for (const [name, ver] of Object.entries(p[depType])) {
                  if (ver.startsWith('workspace:')) {
                    const resolved = ver === 'workspace:*' ? p.version : ver.replace('workspace:', '');
                    p[depType][name] = resolved;
                    changed = true;
                    console.log(name + ': ' + ver + ' -> ' + resolved + ' in ' + depType);
                  }
                }
              }
              if (changed) fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\\n');
            "
          done

      - name: Pack workspace packages
        run: |
          set -euo pipefail
          mkdir -p release-packages

          for pkg in packages/*; do
            if [ -f "$pkg/package.json" ]; then
              npm pack "./$pkg" --pack-destination release-packages
            fi
          done

          ls -lah release-packages

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ steps.resolve_tag.outputs.tag }}
          path: release-packages/*.tgz
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          files: release-packages/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify workspace version alignment
        run: |
          set -euo pipefail
          root_version=$(node -p "require('./package.json').version")
          mismatch=0

          for pkg in packages/*; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi

            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")

            if [ "$version" != "$root_version" ]; then
              echo "Version mismatch: $name has $version but root is $root_version"
              mismatch=1
            fi
          done

          if [ "$mismatch" -ne 0 ]; then
            echo "Version alignment check failed."
            exit 1
          fi

          echo "All workspace package versions are aligned at $root_version"

      - name: Build all packages
        run: bun run build

      - name: Resolve workspace references
        run: |
          set -euo pipefail
          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              let changed = false;
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!p[depType]) continue;
                for (const [name, ver] of Object.entries(p[depType])) {
                  if (ver.startsWith('workspace:')) {
                    const resolved = ver === 'workspace:*' ? p.version : ver.replace('workspace:', '');
                    p[depType][name] = resolved;
                    changed = true;
                    console.log(name + ': ' + ver + ' -> ' + resolved + ' in ' + depType);
                  }
                }
              }
              if (changed) fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\\n');
            "
          done

      - name: Publish workspace packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured. Skipping npm publish."
            exit 0
          fi

          for pkg in packages/*; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi

            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            private=$(node -p "Boolean(require('./$pkg/package.json').private)")

            if [ "$private" = "true" ]; then
              echo "Skipping private package: $name"
              continue
            fi

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping already published package: $name@$version"
              continue
            fi

            echo "Publishing $name@$version"
            npm publish "./$pkg" --access public
          done
